#:schema https://github.com/jdx/mise/blob/main/schema/mise.json

[settings]
experimental = false

[env]
# supports arbitrary env vars so mise can be used like direnv/dotenv

[tools]
ruby = "latest"
'ubi:houseabsolute/omegasort' = 'latest'
'ubi:houseabsolute/precious' = 'latest'
taplo = 'latest'
'npm:prettier' = 'latest'
pre-commit = 'latest'
'npm:markdownlint-cli' = 'latest'
typos = 'latest'
gum = "latest"
glow = "latest"
skate = "latest"

[task_config]
includes = ["./.mise/tasks.toml"]
