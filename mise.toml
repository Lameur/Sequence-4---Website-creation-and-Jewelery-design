[settings]
experimental = false

[env]
# supports arbitrary env vars so mise can be used like direnv/dotenv

[tools]
ruby = "latest"
'ubi:CircleCI-Public/circleci-cli[exe=circleci]' = 'latest'
'ubi:houseabsolute/omegasort' = 'latest'
'ubi:houseabsolute/precious' = 'latest'
bun = "latest"
taplo = 'latest'
'npm:prettier' = 'latest'
pre-commit = 'latest'
'npm:markdownlint-cli' = 'latest'
typos = 'latest'

[task_config]
includes = ["./.mise/tasks.toml"]
