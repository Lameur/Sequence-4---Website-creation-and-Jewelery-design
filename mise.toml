[env]
# supports arbitrary env vars so mise can be used like direnv/dotenv

[tools]
"aqua:pnpm/pnpm" = "latest"
npm = "latest"
ruby = "latest"


[alias.ruby.versions] # project-local aliases
# use vfox:version-fox/vfox-ruby when running `mise i node@backend`
backend = "aqua"

[tasks.bundle]
description = 'Update gem bundle'
run = 'bundle install'
hide = true

[tasks.build]
description = 'Build the website'
depends = ['bundle']
run = 'bundle exec jekyll build'
alias = 'b' # `mise run b`

[tasks.server]
description = 'Serve locally the website'
depends = ['bundle']
run = 'bundle exec jekyll server'
alias = 's'
